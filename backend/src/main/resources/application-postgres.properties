# Perfil POSTGRES: conexao com o banco PostgreSQL real.
# Crie o banco antes:  CREATE DATABASE satellitedb;
# Ajuste usuario/senha conforme sua instalacao.
spring.datasource.url=jdbc:postgresql://localhost:5432/satellitedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" cria/atualiza as tabelas a partir das entidades JPA.
# Para usar os scripts .sql da pasta /database, troque para "validate" ou "none".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
