spring.application.name=satellite-tracker-api

# ----------------------------------------------------------------------------
# Perfil ativo.
#   dev      -> banco H2 em memoria (roda sem instalar nada). PADRAO.
#   postgres -> conecta no PostgreSQL real (ver application-postgres.properties)
# Troque por linha de comando:  --spring.profiles.active=postgres
# ----------------------------------------------------------------------------
spring.profiles.active=dev

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
